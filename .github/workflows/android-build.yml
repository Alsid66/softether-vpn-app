name: Build Flutter APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.22.0'
          cache: true

      - name: Fix package name everywhere
        run: |
          find . -name '*.dart' -exec sed -i 's/softether-vpn-app/softether_vpn_app/g' {} +
          sed -i 's/softether-vpn-app/softether_vpn_app/g' pubspec.yaml
          rm -rf android
          flutter create --platforms=android .

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk

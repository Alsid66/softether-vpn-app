name: Build Flutter APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.16.0'
          cache: true

      # در ریشه پروژه پکیج‌ها را دریافت کن
      - name: Get dependencies
        run: flutter pub get

      # بیلد باید از ریشه پروژه انجام شود تا فلاتر فایل‌های تنظیمی را ببیند
      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release-release.apk

name: Build Flutter APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ۱. نصب محیط فلاتر
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # ۲. دریافت پکیج‌های پروژه
      - name: Get dependencies
        run: |
          cd android
          flutter pub get

      # ۳. بیلد گرفتن مستقیم با فلاتر (که خودش گریدل را مدیریت می‌کند)
      - name: Build APK
        run: |
          flutter build apk --release

      # ۴. آپلود فایل خروجی
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
